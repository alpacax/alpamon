name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  GO_VERSION: '1.25.7'

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml

  goreleaser:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      repo: ${{ steps.channel.outputs.repo }}
      tag: ${{ steps.channel.outputs.tag }}
    steps:
      - name: Determine release channel
        id: channel
        run: |
          TAG="${{ github.ref_name }}"
          TAG_WITHOUT_V="${TAG#v}"

          if [[ "$TAG_WITHOUT_V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
            REPO="alpamon"
          elif [[ "$TAG_WITHOUT_V" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc ]]; then
            CHANNEL="latest"
            REPO="alpamon-latest"
          elif [[ "$TAG_WITHOUT_V" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(dev|beta|alpha) ]]; then
            CHANNEL="dev"
            REPO="alpamon-dev"
          else
            CHANNEL="dev"
            REPO="alpamon-dev"
          fi

          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "tag=${TAG_WITHOUT_V}" >> $GITHUB_OUTPUT

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          # Pin the tag goreleaser treats as "current" to the tag that
          # actually triggered this workflow. Without this, goreleaser
          # falls back to `git describe --tags`, which picks the
          # earliest-created tag when multiple tags share a commit
          # (e.g. an RC tag that was cut first and a GA tag attached
          # to the same SHA after dev validation). The other steps in
          # this workflow already key off `github.ref_name` for the
          # same reason: this aligns goreleaser with that convention.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Fail-fast guard: if `.goreleaser.yaml` silently drops the
      # stable-alias archive (e.g. a future config edit moves it under
      # a build id that doesn't match), goreleaser succeeds but
      # downstream consumers of
      # `releases/latest/download/alpamon-windows-amd64.zip` break with
      # a 404 and we only find out from a user report. Check dist/
      # before any downstream job spends runner time.
      - name: Verify Windows stable-alias archive was produced
        run: |
          set -e
          aliased="dist/alpamon-windows-amd64.zip"
          if [ ! -f "$aliased" ]; then
            echo "::error file=.goreleaser.yaml::expected $aliased in dist/ but it is missing; goreleaser did not produce the stable-name Windows alias"
            echo "dist/ contents:"
            ls -la dist/
            exit 1
          fi
          echo "Found $aliased ($(stat -c%s "$aliased") bytes)"

      # Publish a version-independent alias of the checksums file so
      # downstream consumers (alpacon-server's Windows install guide, any
      # `releases/latest/download/…` flow) can verify SHA-256 without
      # having to resolve the release tag first. The alias is a byte-for-
      # byte copy of the versioned file; entries inside still reference
      # the versioned artifact names, which is what consumers match on.
      # goreleaser has already uploaded the versioned checksums file and
      # created the release, so we attach the alias with `gh release
      # upload`.
      - name: Publish stable-alias checksums file
        env:
          GH_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
        run: |
          set -e
          versioned="dist/alpamon-${{ steps.channel.outputs.tag }}-checksums.sha256"
          aliased="dist/alpamon-checksums.sha256"
          if [ ! -f "$versioned" ]; then
            echo "::error file=.goreleaser.yaml::expected $versioned in dist/ but it is missing; goreleaser did not produce the versioned checksums file"
            echo "dist/ contents:"
            ls -la dist/
            exit 1
          fi
          cp "$versioned" "$aliased"
          # --clobber lets the step be retried without failing on an
          # already-attached asset.
          gh release upload "${{ github.ref_name }}" "$aliased" --clobber
          echo "Uploaded $aliased alongside $versioned"

      - name: Set TAG_NAME from channel output
        run: echo "TAG_NAME=${{ steps.channel.outputs.tag }}" >> $GITHUB_ENV

      - name: Upload AMD64 DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpamon_${{ env.TAG_NAME }}_linux_amd64.deb
          path: dist/alpamon_${{ env.TAG_NAME }}_linux_amd64.deb

      - name: Upload ARM64 DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpamon_${{ env.TAG_NAME }}_linux_arm64.deb
          path: dist/alpamon_${{ env.TAG_NAME }}_linux_arm64.deb

      - name: Upload AMD64 RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpamon-${{ env.TAG_NAME }}-1.linux.amd64.rpm
          path: dist/alpamon-${{ env.TAG_NAME }}-1.linux.amd64.rpm

      - name: Upload ARM64 RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpamon-${{ env.TAG_NAME }}-1.linux.arm64.rpm
          path: dist/alpamon-${{ env.TAG_NAME }}-1.linux.arm64.rpm

  package-smoke-test:
    needs: [goreleaser]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg_type: deb
            container: ubuntu:24.04
            arch: amd64
            install_cmd: apt-get install -y -o Acquire::Retries=3
          - pkg_type: rpm
            container: rockylinux:9
            arch: amd64
            install_cmd: dnf install -y
    container: ${{ matrix.container }}
    steps:
      - name: Set package name
        run: |
          TAG="${{ needs.goreleaser.outputs.tag }}"
          if [ "${{ matrix.pkg_type }}" = "deb" ]; then
            echo "PKG_NAME=alpamon_${TAG}_linux_${{ matrix.arch }}.deb" >> $GITHUB_ENV
          else
            echo "PKG_NAME=alpamon-${TAG}-1.linux.${{ matrix.arch }}.rpm" >> $GITHUB_ENV
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}

      - name: Install prerequisites (DEB only)
        if: matrix.pkg_type == 'deb'
        run: apt-get update -o Acquire::Retries=3 && apt-get install -y -o Acquire::Retries=3 systemd
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install package
        run: ${{ matrix.install_cmd }} ./${{ env.PKG_NAME }}

      - name: Smoke test
        run: alpamon --help

  windows-smoke-test:
    # Windows archives are cross-compiled on the Ubuntu runner (see
    # goreleaser job). This job is the only place in the pipeline that
    # actually executes the produced alpamon.exe on Windows before we
    # publish, so it must fail the release if the binary is broken or
    # the checksum file disagrees with the archive. No continue-on-error.
    #
    # We smoke-test both the versioned archive (canonical, SHA-audited)
    # and the unversioned stable alias that downstreams like
    # alpacon-server consume via `releases/latest/download/<alias>`.
    # Both must be attached to the release tag and both must hold an
    # executable alpamon.exe that reports the expected version.
    needs: [goreleaser]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: versioned
            archive: alpamon-${{ needs.goreleaser.outputs.tag }}-windows-amd64.zip
          - flavor: stable-alias
            archive: alpamon-windows-amd64.zip
    steps:
      - name: Resolve checksums file and release URL
        shell: pwsh
        run: |
          $checksums = "alpamon-${{ needs.goreleaser.outputs.tag }}-checksums.sha256"
          "CHECKSUMS_NAME=$checksums" | Out-File -FilePath $env:GITHUB_ENV -Append
          "REPO_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" | `
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download archive and checksums from release
        shell: pwsh
        run: |
          # goreleaser publishes Windows archives directly to the GitHub
          # release; pull them straight from the release tag so we
          # verify the exact bytes consumers will download (versioned
          # archive via install.ps1, stable alias via
          # `releases/latest/download/alpamon-windows-amd64.zip`).
          Invoke-WebRequest -UseBasicParsing `
            -Uri "$env:REPO_URL/${{ matrix.archive }}" `
            -OutFile "${{ matrix.archive }}"
          Invoke-WebRequest -UseBasicParsing `
            -Uri "$env:REPO_URL/$env:CHECKSUMS_NAME" `
            -OutFile $env:CHECKSUMS_NAME

      - name: Verify SHA-256 against published checksums file
        shell: pwsh
        run: |
          $line = Get-Content $env:CHECKSUMS_NAME | Where-Object {
            $parts = $_ -split '\s+', 2
            $parts.Length -eq 2 -and $parts[1].Trim() -eq "${{ matrix.archive }}"
          } | Select-Object -First 1
          if (-not $line) {
            throw "checksum for ${{ matrix.archive }} not found in $env:CHECKSUMS_NAME"
          }
          $expected = ($line -split '\s+', 2)[0].Trim().ToLower()
          $actual   = (Get-FileHash -Algorithm SHA256 -Path "${{ matrix.archive }}").Hash.ToLower()
          if ($actual -ne $expected) {
            throw "SHA-256 mismatch for ${{ matrix.archive }}: expected $expected, got $actual"
          }
          Write-Host "Checksum verified for ${{ matrix.archive }}: $actual"

      # Runs once per job-matrix execution; guard so we only exercise the
      # byte-identical comparison under a single matrix entry (otherwise
      # we'd do the same network fetch twice for no extra coverage).
      # The check guards against a future regression where the "Publish
      # stable-alias checksums file" step in the goreleaser job silently
      # uploads the wrong bytes (or nothing at all).
      - name: Verify stable-alias checksums file matches versioned file
        if: matrix.flavor == 'versioned'
        shell: pwsh
        run: |
          $aliasName = "alpamon-checksums.sha256"
          Invoke-WebRequest -UseBasicParsing `
            -Uri "$env:REPO_URL/$aliasName" `
            -OutFile $aliasName
          $versionedHash = (Get-FileHash -Algorithm SHA256 -Path $env:CHECKSUMS_NAME).Hash.ToLower()
          $aliasHash     = (Get-FileHash -Algorithm SHA256 -Path $aliasName).Hash.ToLower()
          if ($versionedHash -ne $aliasHash) {
            throw "stable-alias checksums file diverges from versioned file: $aliasName=$aliasHash vs $env:CHECKSUMS_NAME=$versionedHash"
          }
          Write-Host "Alias checksums file matches versioned file: $aliasHash"

      - name: Extract archive
        shell: pwsh
        run: |
          Expand-Archive -Path "${{ matrix.archive }}" -DestinationPath "extracted-${{ matrix.flavor }}" -Force
          if (-not (Test-Path "extracted-${{ matrix.flavor }}\alpamon.exe")) {
            throw "alpamon.exe not found in ${{ matrix.archive }} after extraction"
          }

      - name: Smoke test (--version)
        shell: pwsh
        run: |
          $output = & ".\extracted-${{ matrix.flavor }}\alpamon.exe" --version
          if ($LASTEXITCODE -ne 0) {
            throw "alpamon --version exited with code $LASTEXITCODE"
          }
          if ([string]::IsNullOrWhiteSpace($output)) {
            throw "alpamon --version produced empty output"
          }
          # The release build injects the tag via ldflags; assert the
          # smoke binary reports the tag we intended to ship.
          $expected = "${{ needs.goreleaser.outputs.tag }}"
          if ($output.Trim() -ne $expected -and $output.Trim() -ne "v$expected") {
            throw "alpamon --version reports '$($output.Trim())', expected '$expected' or 'v$expected'"
          }
          Write-Host "${{ matrix.flavor }} -> alpamon --version: $output"

  packagecloud-deploy:
    needs: [goreleaser, package-smoke-test, windows-smoke-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg_type: deb
            arch: amd64
            distro: any/any
          - pkg_type: deb
            arch: arm64
            distro: any/any
          - pkg_type: rpm
            arch: amd64
            distro: rpm_any/rpm_any
          - pkg_type: rpm
            arch: arm64
            distro: rpm_any/rpm_any
    steps:
      - name: Set environment variables
        run: |
          TAG="${{ github.ref_name }}"
          TAG_WITHOUT_V="${TAG#v}"
          echo "TAG_NAME=${TAG_WITHOUT_V}" >> $GITHUB_ENV
          echo "REPO_NAME=${{ needs.goreleaser.outputs.repo }}" >> $GITHUB_ENV

      - name: Set package name
        run: |
          if [ "${{ matrix.pkg_type }}" = "deb" ]; then
            echo "PKG_NAME=alpamon_${{ env.TAG_NAME }}_linux_${{ matrix.arch }}.deb" >> $GITHUB_ENV
          else
            echo "PKG_NAME=alpamon-${{ env.TAG_NAME }}-1.linux.${{ matrix.arch }}.rpm" >> $GITHUB_ENV
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}

      - name: Upload to PackageCloud
        uses: danielmundi/upload-packagecloud@v1
        with:
          package-name: ${{ env.PKG_NAME }}
          packagecloud-username: alpacax
          packagecloud-repo: ${{ env.REPO_NAME }}
          packagecloud-distrib: ${{ matrix.distro }}
          packagecloud-token: ${{ secrets.PACKAGECLOUD_TOKEN }}
