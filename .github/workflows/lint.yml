name: Lint
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "scripts/**"

  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

env:
  GO_VERSION: '1.25.10'

jobs:
  linter:
    name: golangci-lint
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate go code
        run: go generate ./pkg/db/ent

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout=5m
