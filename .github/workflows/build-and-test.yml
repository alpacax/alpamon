name: Build and Test
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"

  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

  workflow_call:

permissions:
  contents: read

env:
  GO_VERSION: '1.25.11'

jobs:
  verify-tidy:
    name: Verify go.mod and go.sum are tidy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go and generate ent code
        uses: ./.github/actions/setup-go-generate
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  build-and-test:
    name: Build and Test (${{ matrix.distro }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian/Ubuntu (amd64)
          - distro: ubuntu-20.04
            container: ubuntu:20.04
            pkg_manager: apt-get
            runner: ubuntu-latest
          - distro: ubuntu-22.04
            container: ubuntu:22.04
            pkg_manager: apt-get
            runner: ubuntu-latest
          - distro: ubuntu-24.04
            container: ubuntu:24.04
            pkg_manager: apt-get
            runner: ubuntu-latest
          - distro: debian-11
            container: debian:11
            pkg_manager: apt-get
            runner: ubuntu-latest
          - distro: debian-12
            container: debian:12
            pkg_manager: apt-get
            runner: ubuntu-latest
          # RHEL/CentOS yum-based (amd64)
          - distro: rocky-8
            container: rockylinux:8
            pkg_manager: yum
            runner: ubuntu-latest
          - distro: rhel-8
            container: redhat/ubi8
            pkg_manager: yum
            runner: ubuntu-latest
          # RHEL/CentOS dnf-based (amd64)
          - distro: rocky-9
            container: rockylinux:9
            pkg_manager: dnf
            runner: ubuntu-latest
          - distro: almalinux-9
            container: almalinux:9
            pkg_manager: dnf
            runner: ubuntu-latest
          - distro: rhel-9
            container: redhat/ubi9
            pkg_manager: dnf
            runner: ubuntu-latest
          # Fedora (amd64)
          - distro: fedora-41
            container: fedora:41
            pkg_manager: dnf
            runner: ubuntu-latest
          # Oracle Linux (amd64)
          - distro: oracle-9
            container: oraclelinux:9
            pkg_manager: dnf
            runner: ubuntu-latest
          # Amazon Linux (amd64)
          - distro: amazonlinux-2023
            container: amazonlinux:2023
            pkg_manager: dnf
            runner: ubuntu-latest
          # ARM64
          - distro: ubuntu-24.04-arm64
            container: ubuntu:24.04
            pkg_manager: apt-get
            runner: ubuntu-24.04-arm
          - distro: rocky-9-arm64
            container: rockylinux:9
            pkg_manager: dnf
            runner: ubuntu-24.04-arm
          - distro: amazonlinux-2023-arm64
            container: amazonlinux:2023
            pkg_manager: dnf
            runner: ubuntu-24.04-arm

    steps:
      - name: Install dependencies (Debian/Ubuntu)
        if: matrix.pkg_manager == 'apt-get'
        run: |
          apt-get update -o Acquire::Retries=3
          apt-get install -y -o Acquire::Retries=3 --no-install-recommends git curl gcc libc6-dev ca-certificates

      - name: Install dependencies (yum)
        if: matrix.pkg_manager == 'yum'
        run: yum install -y git curl gcc glibc-devel tar

      - name: Install dependencies (dnf)
        if: matrix.pkg_manager == 'dnf'
        run: dnf install -y --allowerasing git curl gcc glibc-devel tar

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go and generate ent code
        uses: ./.github/actions/setup-go-generate
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v .
        working-directory: ./cmd/alpamon

      - name: Run Tests
        run: go test -v ./... -p 1

  build-and-test-windows:
    name: Build and Test (windows-amd64)
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go and generate ent code
        uses: ./.github/actions/setup-go-generate
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v .
        working-directory: ./cmd/alpamon

      # Parse install.ps1 under both Windows PowerShell 5.1 and
      # PowerShell 7.x to catch future syntax-compatibility drift.
      # This is a parse-only regression guard, not a behavior test:
      # the install.ps1 PS-7.x fix gates ServicePointManager assignments
      # on $PSVersionTable.PSEdition (only the Desktop edition takes the
      # legacy shim), which both shells parse cleanly. Actual fix
      # behavior is verified manually on hosts with degraded OS TLS
      # (see docs/windows.md > PowerShell compatibility).
      - name: Parse install.ps1 under Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $script = Join-Path $PWD 'scripts\install.ps1'
          if (-not (Test-Path $script)) { throw "install.ps1 not found at $script" }
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              $script, [ref]$tokens, [ref]$parseErrors) | Out-Null
          if ($parseErrors.Count -gt 0) {
              foreach ($e in $parseErrors) {
                  Write-Host "::error file=scripts/install.ps1,line=$($e.Extent.StartLineNumber)::$($e.Message)"
              }
              throw "install.ps1 has $($parseErrors.Count) parse error(s) under Windows PowerShell 5.1."
          }
          Write-Host "install.ps1 parsed cleanly under Windows PowerShell $($PSVersionTable.PSVersion)."

      - name: Parse install.ps1 under PowerShell 7.x
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $script = Join-Path $PWD 'scripts/install.ps1'
          if (-not (Test-Path $script)) { throw "install.ps1 not found at $script" }
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              $script, [ref]$tokens, [ref]$parseErrors) | Out-Null
          if ($parseErrors.Count -gt 0) {
              foreach ($e in $parseErrors) {
                  Write-Host "::error file=scripts/install.ps1,line=$($e.Extent.StartLineNumber)::$($e.Message)"
              }
              throw "install.ps1 has $($parseErrors.Count) parse error(s) under PowerShell 7.x."
          }
          Write-Host "install.ps1 parsed cleanly under PowerShell $($PSVersionTable.PSVersion)."

      - name: Vet
        run: go vet ./...

      # Run the full suite on Windows. Packages that are Unix-only by
      # construction (user/group handlers not registered on Windows,
      # Unix shell path contracts, Unix file-mode assertions) are gated
      # with //go:build !windows or per-test runtime.GOOS skips; no
      # silent blanket skip. See alpamon issue #284 acceptance criteria.
      - name: Run Tests
        run: go test -v ./... -p 1

      # `--version` should print the version and exit 0 regardless of
      # whether Alpamon is registered. Guards against regressions that
      # would stall startup (e.g., trying to read config, hitting SCM).
      - name: Smoke test (--version)
        shell: pwsh
        run: |
          $exe = Join-Path $PWD 'cmd\alpamon\alpamon.exe'
          if (-not (Test-Path $exe)) { throw "alpamon.exe not found at $exe" }
          $output = & $exe --version
          if ($LASTEXITCODE -ne 0) {
            throw "alpamon --version exited with code $LASTEXITCODE"
          }
          if ([string]::IsNullOrWhiteSpace($output)) {
            throw "alpamon --version produced empty output"
          }
          Write-Host "alpamon --version: $output"

  build-and-test-macos:
    name: Build and Test (macos-arm64)
    runs-on: macos-14
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go and generate ent code
        uses: ./.github/actions/setup-go-generate
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v .
        working-directory: ./cmd/alpamon

      - name: Run Tests
        run: go test -v ./... -p 1
